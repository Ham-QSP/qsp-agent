name: CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev \
            libhamlib-dev \
            libopus-dev \
            pkg-config

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Build workspace
        run: cargo build --workspace --locked --verbose

      - name: Run tests
        run: cargo test --workspace --locked --verbose

  package-deb:
    needs: build-and-test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: amd64
            platform: linux/amd64
          - architecture: arm64
            platform: linux/arm64
          - architecture: armhf
            platform: linux/arm/v7

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Debian package
        run: |
          mkdir -p dist/${{ matrix.architecture }}
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file package/Dockerfile.deb \
            --output type=local,dest=dist/${{ matrix.architecture }} \
            .

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: qsp-agent-deb-${{ matrix.architecture }}
          path: dist/${{ matrix.architecture }}/*.deb
          if-no-files-found: error

  release:
    needs: package-deb
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: qsp-agent-deb-*
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.deb
